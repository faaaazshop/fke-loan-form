<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FKE Automobil Enterprise</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo img{
width:180px;
}

h1{
text-align:center;
color:#0d47a1;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#555;
margin-bottom:25px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
margin-bottom:5px;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

textarea{
height:100px;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
background:#0d47a1;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#1565c0;
}

.footer{
text-align:center;
margin-top:20px;
color:#666;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="logo-fke.jpeg" alt="FKE Logo">

<form>

<input type="text">

<input type="text">

<label>Pekerjaan</label>
<input type="text">

<label>Nama Majikan</label>
<input type="text">

<label>Gaji Bersih</label>
<input type="number">

<label>Model Kereta</label>
<input type="text">

<label>Deposit</label>
<input type="number">

<label>Bulanan</label>
<input type="number">

<select>

<button type="button" onclick="submitForm()">
HANTAR PERMOHONAN
</button>

</form>

<div class="footer">
FKE Automobil Enterprise © 2026
</div>

</div>

<script>

function submitForm(){

alert("Permohonan berjaya dihantar kepada FKE Automobil.");

}

</script>

</html>
